<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <alias>
    <family>serif</family>
    <prefer>
        <family>Roboto</family>
        <family>Symbols Nerd Font</family>
        <family>serif</family>
    </prefer>
  </alias>
  <alias>
     <family>serif-mono</family>
     <prefer>
         <family>Roboto Mono</family>
         <family>Symbols Nerd Font</family>
         <family>serif</family>
     </prefer>
   </alias>
  <alias>
    <family>sans-serif</family>
    <prefer>
        <family>Roboto</family>
        <family>Symbols Nerd Font</family>
        <family>sans-serif</family>
    </prefer>
  </alias>
  <alias>
     <family>sans-serif-mono</family>
     <prefer>
         <family>Roboto Mono</family>
         <family>Symbols Nerd Font</family>
         <family>sans-serif</family>
     </prefer>
   </alias>
</fontconfig>
